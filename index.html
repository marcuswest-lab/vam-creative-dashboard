<head>

<title>VAM Creative Performance Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0F14;color:#E2E8F0;font-family:'DM Sans',sans-serif;padding:24px 24px 48px;min-height:100vh}
.container{max-width:1700px;margin:0 auto}
h1{font-size:28px;font-weight:700;color:#F8FAFC;text-align:center;margin-bottom:4px}
.subtitle{font-size:14px;color:#94A3B8;text-align:center;margin-bottom:16px}
.legend{display:flex;justify-content:center;gap:24px;font-size:12px;color:#94A3B8;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-green{background:#34D399}
.dot-yellow{background:#FBBF24}
.dot-red{background:#F87171}
.dot-gray{background:#475569}
.controls{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-input{width:280px;padding:8px 12px;background:#151922;border:1px solid #334155;border-radius:8px;color:#E2E8F0;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.search-input:focus{border-color:#3B82F6}
.search-input::placeholder{color:#475569}
.filter-btn{padding:7px 14px;background:#151922;border:1px solid #334155;border-radius:8px;color:#94A3B8;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.filter-btn:hover{color:#CBD5E1;border-color:#475569}
.filter-btn.active{background:#334155;color:#E2E8F0;border-color:#475569}
.tab-bar{display:inline-flex;background:#151922;border-radius:10px;border:1px solid #1E293B;margin-bottom:14px;width:fit-content}
.tab{padding:9px 18px;font-size:13px;font-weight:500;color:#64748B;cursor:pointer;border-right:1px solid #1E293B;transition:all .15s;white-space:nowrap;user-select:none}
.tab:last-child{border-right:none}
.tab:hover{color:#CBD5E1}
.tab.active{background:#3B82F6;color:#fff;border-radius:9px}
.tab .cnt{opacity:.6;font-size:11px;margin-left:4px}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #1E293B;background:#151922}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#0C0F14;color:#94A3B8;font-weight:600;padding:10px 12px;text-align:right;white-space:nowrap;border-bottom:1px solid #1E293B;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;font-size:11px;letter-spacing:.3px;text-transform:uppercase}
thead th:hover{color:#CBD5E1}
thead th.col-idx,thead th.col-name{text-align:left}
thead th.col-idx{left:0;z-index:11;min-width:36px;width:36px}
thead th.col-name{left:36px;z-index:11;min-width:340px}
thead th.col-ad{text-align:center;min-width:66px}
thead th .sort-arrow{font-size:10px;margin-left:3px;opacity:.3}
thead th .sort-arrow.active-asc,thead th .sort-arrow.active-desc{opacity:1;color:#3B82F6}
tbody td{padding:8px 12px;border-bottom:1px solid #1E293B;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#CBD5E1;white-space:nowrap}
tbody td.col-idx{text-align:center;color:#475569;font-size:11px;position:sticky;left:0;z-index:5;background:#151922;min-width:36px;width:36px}
tbody td.col-name{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500;color:#F8FAFC;position:sticky;left:36px;z-index:5;background:#151922;min-width:340px;max-width:420px;overflow:hidden;text-overflow:ellipsis}
tbody td.col-ad{text-align:center}
tbody td.col-variations{text-align:center;font-family:'JetBrains Mono',monospace;color:#94A3B8}
tbody tr:hover td{background:#1a1f2e}
tbody tr:hover td.col-idx,tbody tr:hover td.col-name{background:#1a1f2e}
.nd{color:#475569}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.wk{background:rgba(52,211,153,.15);color:#34D399}
.of{background:rgba(251,191,36,.15);color:#FBBF24}
.ak{background:rgba(248,113,113,.15);color:#F87171}
.view-link{color:#60A5FA;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:11px;display:inline-flex;align-items:center;gap:3px}
.view-link:hover{color:#93C5FD}
.view-link svg{width:10px;height:10px;flex-shrink:0}
.row-count{text-align:right;color:#475569;font-size:12px;margin-top:8px}
.profit-pos{color:#34D399}
.profit-neg{color:#F87171}
</style>
</head>

const TABS = [
  {key:'statics',label:'Static Ads',isVideo:false,isConcept:false},
  {key:'staticConcepts',label:'Static Concepts',isVideo:false,isConcept:true},
  {key:'videos',label:'Video Ads',isVideo:true,isConcept:false},
  {key:'videoConcepts',label:'Video Concepts',isVideo:true,isConcept:true},
  {key:'copy',label:'Copy',isVideo:false,isConcept:false},
  {key:'copyConcepts',label:'Copy Concepts',isVideo:false,isConcept:true},
];

const KPI = {
  roas: {green:1.8,yellow:1.6},
  costConnected: {green:300,yellow:400},
  hookRate: {green:20,yellow:15},
  holdRate: {green:20,yellow:15},
};

let activeTab = 'statics';
let sortCol = 'cost';
let sortDir = 'desc';
let filterWinners = false;
let filterSpend = false;
let searchTerm = '';

function ccBadge(v, metric){
  if(v==null||v===0) return 'nd';
  const k=KPI[metric];
  if(!k) return 'nd';
  if(metric==='roas'||metric==='hookRate'||metric==='holdRate'||metric==='closeRate'){
    return v>=k.green?'wk':v>=k.yellow?'of':'ak';
  }
  return v<=k.green?'wk':v<=k.yellow?'of':'ak';
}

function fmtDollar(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  const neg = v < 0;
  const abs = Math.abs(v);
  const s = '$'+abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return neg ? '-'+s : s;
}
function fmtDollarBadge(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  return '$'+Math.round(v).toLocaleString('en-US');
}
function fmtInt(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  return Math.round(v).toLocaleString('en-US');
}
function fmtPct1(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  return v.toFixed(1)+'%';
}
function fmtPct2(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  return v.toFixed(2)+'%';
}
function fmtRoas(v){
  if(v==null) return '<span class="nd">\u2014</span>';
  return v.toFixed(2)+'x';
}

function fmtCell(v, fmt, key){
  if(key==='roas'){
    if(v==null) return '<span class="nd">\u2014</span>';
    const cls=ccBadge(v,'roas');
    return '<span class="badge '+cls+'">'+fmtRoas(v)+'</span>';
  }
  if(key==='costConnected'){
    if(v==null) return '<span class="nd">\u2014</span>';
    const cls=ccBadge(v,'costConnected');
    return '<span class="badge '+cls+'">'+fmtDollarBadge(v)+'</span>';
  }
  if(key==='hookRate'){
    if(v==null) return '<span class="nd">\u2014</span>';
    const cls=ccBadge(v,'hookRate');
    return '<span class="badge '+cls+'">'+fmtPct1(v)+'</span>';
  }
  if(key==='holdRate'){
    if(v==null) return '<span class="nd">\u2014</span>';
    const cls=ccBadge(v,'holdRate');
    return '<span class="badge '+cls+'">'+fmtPct1(v)+'</span>';
  }
  if(key==='profit'){
    if(v==null) return '<span class="nd">\u2014</span>';
    const cls=v>=0?'profit-pos':'profit-neg';
    return '<span class="'+cls+'">'+fmtDollar(v)+'</span>';
  }
  if(fmt==='dollar') return fmtDollar(v);
  if(fmt==='int') return fmtInt(v);
  if(fmt==='pct1') return fmtPct1(v);
  if(fmt==='pct2') return fmtPct2(v);
  if(fmt==='roas') return fmtRoas(v);
  return v==null?'<span class="nd">\u2014</span>':String(v);
}

function updateLegend(){
  const tab=TABS.find(t=>t.key===activeTab);
  const isVideo=tab&&tab.isVideo;
  let html='';
  html+='<div class="legend-item"><span class="legend-dot dot-green"></span>ROAS \u2265 1.8x | $/Connected \u2264 $300'+(isVideo?' | Hook/Hold \u2265 20%':'')+'</div>';
  html+='<div class="legend-item"><span class="legend-dot dot-yellow"></span>ROAS 1.6\u20131.8x | $/Connected $300\u2013$400'+(isVideo?' | Hook/Hold 15\u201320%':'')+'</div>';
  html+='<div class="legend-item"><span class="legend-dot dot-red"></span>ROAS < 1.6x | $/Connected > $400'+(isVideo?' | Hook/Hold < 15%':'')+'</div>';
  html+='<div class="legend-item"><span class="legend-dot dot-gray"></span>No data</div>';
  document.getElementById('legend').innerHTML=html;
}

function buildTabBar(){
  let html='';
  TABS.forEach(t=>{
    const cnt=DATA[t.key].length;
    const cls=t.key===activeTab?'tab active':'tab';
    html+='<div class="'+cls+'" onclick="switchTab(\''+t.key+'\')">'+t.label+'<span class="cnt">('+cnt+')</span></div>';
  });
  document.getElementById('tabBar').innerHTML=html;
}

function switchTab(key){
  activeTab=key;
  sortCol='cost';sortDir='desc';
  buildTabBar();
  updateLegend();
  renderTable();
}

function toggleFilter(type){
  if(type==='winners'){filterWinners=!filterWinners;document.getElementById('btn-winners').classList.toggle('active');}
  if(type==='spend'){filterSpend=!filterSpend;document.getElementById('btn-spend').classList.toggle('active');}
  renderTable();
}

function renderTable(){
  const tab=TABS.find(t=>t.key===activeTab);
  const colDefs=COLS[activeTab];
  let rows=[...DATA[activeTab]];
  const total=rows.length;

  if(searchTerm){
    const st=searchTerm.toLowerCase();
    rows=rows.filter(r=>r.name.toLowerCase().includes(st));
  }
  if(filterWinners){
    rows=rows.filter(r=>(r.roas!=null&&r.roas>=1.8)||(r.costConnected!=null&&r.costConnected<=300));
  }
  if(filterSpend){
    rows=rows.filter(r=>r.cost!=null&&r.cost>=1500);
  }

  rows.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(sortCol==='name'){
      if(va==null&&vb==null) return 0;
      if(va==null) return 1;
      if(vb==null) return -1;
      return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    }
    if(va==null&&vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    return sortDir==='asc'?va-vb:vb-va;
  });

  let hdr='<th class="col-idx">#</th><th class="col-name" onclick="doSort(\'name\')">Name'+sortArrow('name')+'</th>';
  hdr+='<th class="col-ad">Ad</th>';
  if(tab.isConcept) hdr+='<th onclick="doSort(\'variations\')"># Ads'+sortArrow('variations')+'</th>';
  colDefs.forEach(c=>{
    hdr+='<th onclick="doSort(\''+c[0]+'\')">'+c[1]+sortArrow(c[0])+'</th>';
  });
  document.getElementById('headerRow').innerHTML=hdr;

  let body='';
  rows.forEach((r,i)=>{
    const link=r.link;
    const linkHtml=link?'<a class="view-link" href="'+link+'" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 1.5h7v7M10.5 1.5L1.5 10.5"/></svg></a>':'<span class="nd">\u2014</span>';
    body+='<tr>';
    body+='<td class="col-idx">'+(i+1)+'</td>';
    body+='<td class="col-name" title="'+escHtml(r.name)+'">'+escHtml(r.name)+'</td>';
    body+='<td class="col-ad">'+linkHtml+'</td>';
    if(tab.isConcept) body+='<td class="col-variations">'+r.variations+'</td>';
    colDefs.forEach(c=>{
      body+='<td>'+fmtCell(r[c[0]],c[2],c[0])+'</td>';
    });
    body+='</tr>';
  });
  document.getElementById('tableBody').innerHTML=body;
  document.getElementById('rowCount').textContent=rows.length+' of '+total+' creatives';
}

function sortArrow(col){
  if(sortCol===col){
    return '<span class="sort-arrow '+(sortDir==='asc'?'active-asc':'active-desc')+'">'+(sortDir==='asc'?'\u25B2':'\u25BC')+'</span>';
  }
  return '<span class="sort-arrow">\u25B2</span>';
}

function doSort(col){
  if(col==='name'){
    if(sortCol==='name') sortDir=sortDir==='asc'?'desc':'asc';
    else{sortCol='name';sortDir='asc';}
  } else {
    if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
    else{sortCol=col;sortDir='desc';}
  }
  renderTable();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('search').addEventListener('input',function(e){
  searchTerm=e.target.value;
  renderTable();
});

buildTabBar();
updateLegend();
renderTable();
</script>
